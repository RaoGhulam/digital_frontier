{%extends "layout.html"%}

{% block body %}

<!-- Page Header -->
<header class="masthead" id="header" style="background-image: url('{{ url_for('static', filename='assets/img/contact-bg.jpg') }}'); background-size: cover; opacity: 1; transition: opacity 1s;">
    <div class="container position-relative px-4 px-lg-5 text-center text-white">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="site-heading">
                    <h1>Digital Frontier</h1>
                    <span class="subheading">Exploring the Future of AI, Tech, and Innovation</span>
                </div>
            </div>
        </div>
    </div>
</header>

<script>
    // Wait for the DOM to be fully loaded before running the script
    document.addEventListener('DOMContentLoaded', function () {
        // List of background images for the slideshow
        const images = [
            '{{ url_for('static', filename='assets/img/home-bg1.jpeg') }}',
            '{{ url_for('static', filename='assets/img/home-bg2.jpg') }}',
            '{{ url_for('static', filename='assets/img/home-bg3.jpg') }}',
            '{{ url_for('static', filename='assets/img/post-bg3.jpeg') }}',
            '{{ url_for('static', filename='assets/img/post-bg2.jpg') }}',
            '{{ url_for('static', filename='assets/img/post-bg1.jpg') }}',
            '{{ url_for('static', filename='assets/img/post-bg4.jpg') }}',
            '{{ url_for('static', filename='assets/img/post-bg7.jpg') }}',

            
        ];

        let currentImageIndex = 0;
        const headerElement = document.getElementById('header');

        // Function to change background image
        function changeBackgroundImage() {
            currentImageIndex = (currentImageIndex + 1) % images.length;
            headerElement.style.opacity = 40;  // Start fading out
            setTimeout(function () {
                headerElement.style.backgroundImage = `url(${images[currentImageIndex]})`;
                headerElement.style.opacity = 1;  // Fade in the new background
            }, 300);  // Delay to match the fade-out transition
        }

        // Change background image every 5 seconds
        setInterval(changeBackgroundImage, 5000);
    });
</script>


<!-- Main Content -->
<main class="mb-5">
    <div class="container px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <p class="text-muted text-center fs-5">Want to get in touch? Fill out the form below, and I'll respond as soon as possible!</p>
                
                <div class="my-5 p-4 shadow-sm rounded bg-white">
                    
                    <form id="contactForm" action="/contact" method="post">
                        
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required placeholder="Enter your full name">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label fw-bold">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" name="phone" required placeholder="Enter your phone number">
                        </div>

                        <div class="mb-4">
                            <label for="message" class="form-label fw-bold">Message</label>
                            <textarea class="form-control" id="message" name="message" rows="6" required placeholder="Write your message here..."></textarea>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid">
                            <button class="btn btn-primary text-uppercase py-2 fw-bold" id="submitButton" type="submit">Send Message</button>
                        </div>

                    </form>
                    
                </div>
            </div>
        </div>
    </div>
</main>

{% endblock %}
