<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Admin Login">
    <meta name="author" content="Mathgorithm">
    <link rel="icon" href="{{ url_for('static', filename='assets/favicon.png') }}">

    <title>Login - Digital Frontier</title>

    <!-- Bootstrap core CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom styles -->
    <style>
        body {
            background-color: #f4f7fc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .form-signin {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        }
        .form-signin img {
            width: 70px;
            margin-bottom: 15px;
        }
        .form-signin h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .form-floating input {
            border-radius: 5px;
            padding: 12px;
            transition: 0.3s ease-in-out;
        }
        .form-floating input:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .password-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 16px;
            color: #aaa;
        }
        .toggle-password:hover {
            color: #007bff;
        }
        .signup-link {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }
        .signup-link a {
            color: #007bff;
            font-weight: 500;
            text-decoration: none;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: red;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <form class="form-signin text-center" action="/login" method="post">
        <img src="{{ url_for('static', filename='assets/img/logo.png') }}" alt="Logo">
        <h1 class="h3">Welcome Back</h1>

        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}
        
        <div class="form-floating mb-3">
            <input type="text" name="username" id="inputUsername" class="form-control" placeholder="Username" required autofocus>
            <label for="inputUsername">Username</label>
        </div>

        <div class="form-floating mb-3 password-wrapper">
            <input type="password" name="password" id="inputPassword" class="form-control" placeholder="Password" required>
            <label for="inputPassword">Password</label>
            <span class="toggle-password" onclick="togglePassword()">🔒</span>
        </div>

        <div class="form-check text-start mb-3">
            <input class="form-check-input" type="checkbox" name="remember" value="remember-me" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Remember me</label>
        </div>

        <button class="btn btn-lg btn-primary w-100" id="loginBtn" type="submit">
            Sign in
        </button>

        <div class="signup-link">
            Don't have an account? <a href="/signup">Sign Up</a>
        </div>

        <p class="mt-3 text-muted">© Digital Frontier 2025</p>
    </form>

    <script>
        function togglePassword() {
            let passwordField = document.getElementById("inputPassword");
            let toggleIcon = document.querySelector(".toggle-password");
            if (passwordField.type === "password") {
                passwordField.type = "text";
                toggleIcon.textContent = "🔓";
            } else {
                passwordField.type = "password";
                toggleIcon.textContent = "🔒";
            }
        }

        document.querySelector("form").addEventListener("submit", function() {
            let btn = document.getElementById("loginBtn");
            btn.innerHTML = "Signing in...";
            btn.disabled = true;
        });
    </script>

</body>
</html>
