<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="{{ url_for('static', filename='assets/favicon.png') }}">
    <title>Sign Up - Digital Frontier</title>

    <!-- Bootstrap CSS for better responsiveness -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .signup-container {
            background: white;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
        }

        .form-control {
            border-radius: 5px;
            padding: 12px;
        }

        .btn-custom {
            background-color: #0085A1;
            color: white;
            border: none;
            transition: all 0.3s ease-in-out;
        }

        .btn-custom:hover {
            background-color: #006f87;
        }

        .btn-danger {
            background-color: #f44336;
        }

        .btn-danger:hover {
            background-color: #d32f2f;
        }

        .toggle-password {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }

        .text-muted {
            font-size: 14px;
        }
    </style>
</head>
<body>

    <form class="signup-container" action="/signup" method="post">
        <h2 class="text-center mb-3">Create an Account</h2>
        <p class="text-muted text-center">Fill in the details below to sign up.</p>
        <hr>

        <div class="mb-3">
            <label for="username" class="form-label"><b>Username</b></label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Enter Username" required>
        </div>

        <div class="mb-3 position-relative">
            <label for="password" class="form-label"><b>Password</b></label>
            <input type="password" id="password" name="psw" class="form-control" placeholder="Enter Password" required>
            <span class="toggle-password" onclick="togglePassword()">
                <i class="fas fa-eye"></i>
            </span>
        </div>

        <div class="d-flex gap-2">
            <button type="reset" class="btn btn-danger w-50">Cancel</button>
            <button type="submit" class="btn btn-custom w-50">Sign Up</button>
        </div>

        <p class="text-center mt-3 text-muted">
            Already have an account? <a href="/login" class="text-decoration-none text-primary">Log in</a>
        </p>
    </form>

    <!-- Font Awesome for icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

    <script>
        function togglePassword() {
            var passwordField = document.getElementById("password");
            var icon = document.querySelector(".toggle-password i");

            if (passwordField.type === "password") {
                passwordField.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passwordField.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>

</body>
</html>
